version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sixsevenchan_postgres
    environment:
      POSTGRES_DB: imageboard_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: